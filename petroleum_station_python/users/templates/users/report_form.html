{% extends 'base.html' %}

{% block title %}Submit Report - Petroleum Station{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card glass-card">
            <div class="card-header border-bottom border-secondary p-4">
                <h3 class="h4 mb-0 text-white">Submit New Report</h3>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-4">
                        <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-white-50">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="invalid-feedback d-block mt-2">
                            {{ field.errors|join:", " }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end gap-3 mt-5">
                        <a href="{% url 'users:report_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-glass px-4">
                            <i class="bi bi-send me-2"></i>Submit Report
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
