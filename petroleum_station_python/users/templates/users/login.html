<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Petroleum Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1832 40%, #091528 70%, #0a0f1e 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.15) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
            animation: blob1 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(100, 0, 255, 0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
            animation: blob2 10s ease-in-out infinite;
        }

        @keyframes blob1 {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(-30px, 30px); }
        }

        @keyframes blob2 {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.15) translate(40px, -20px); }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Logo / Brand */
        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.2), rgba(100, 0, 255, 0.2));
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #00c8ff;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 200, 255, 0.2);
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .brand h1 span {
            background: linear-gradient(135deg, #00c8ff, #6400ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 16px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.1);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.25);
        }

        /* Error Alert */
        .alert-error {
            background: rgba(220, 50, 50, 0.12);
            border: 1px solid rgba(220, 50, 50, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #ff7070;
            font-size: 13px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00c8ff, #0077cc);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            margin-top: 8px;
            box-shadow: 0 8px 24px rgba(0, 200, 255, 0.25);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 200, 255, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Footer note */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .login-footer i {
            margin-right: 4px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- Brand -->
    <div class="brand">
        <div class="brand-icon">
            <i class="bi bi-fuel-pump-fill"></i>
        </div>
        <h1>Petroleum <span>Pro</span></h1>
        <p>Station Management System</p>
    </div>

    <!-- Card -->
    <div class="login-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        {% if error %}
        <div class="alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" id="loginForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
    </div>

    <div class="login-footer">
        <i class="bi bi-shield-check"></i>Secured connection &mdash; Petroleum Station Management
    </div>
</div>

</body>
</html>
